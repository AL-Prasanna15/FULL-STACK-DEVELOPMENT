<!DOCTYPE html>
<html>
<head>
<title>To-Do List</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

.container{
    width: 300px;
    margin: 100px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

h2{
    text-align: center;
}

ul{
    list-style: none;
    padding: 0;
}

li{
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

li:last-child{
    border-bottom: none;
}

input[type="checkbox"]{
    margin-right: 10px;
}
</style>

</head>

<body>

<div class="container">
<h2>My To-Do List</h2>

<ul>
<li><input type="checkbox"> Study HTML</li>
<li><input type="checkbox"> Practice CSS</li>
<li><input type="checkbox"> Complete homework</li>
<li><input type="checkbox"> Go for exercise</li>
</ul>

</div>

</body>
</html>
